<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;user-select:none}

  .coin-container{perspective:800px;margin-bottom:32px}
  .coin{width:180px;height:180px;position:relative;transform-style:preserve-3d;transition:transform 0.1s ease-out;cursor:pointer}
  .coin.flipping{transition:none;animation:flip 1.8s ease-out forwards}
  .coin .side{position:absolute;width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;backface-visibility:hidden;border:6px solid rgba(255,255,255,0.2);text-shadow:0 2px 4px rgba(0,0,0,0.3)}
  .coin .heads{background:linear-gradient(145deg,#ffd700,#f0c030,#daa520);color:#5a4000;box-shadow:0 0 30px rgba(255,215,0,0.4),inset 0 -4px 8px rgba(0,0,0,0.15)}
  .coin .tails{background:linear-gradient(145deg,#c0c0c0,#a8a8a8,#909090);color:#3a3a3a;transform:rotateY(180deg);box-shadow:0 0 30px rgba(192,192,192,0.4),inset 0 -4px 8px rgba(0,0,0,0.15)}

  @keyframes flip{
    0%{transform:rotateY(0)}
    100%{transform:rotateY(var(--end-rotation))}
  }

  .result{font-size:28px;font-weight:700;min-height:40px;margin-bottom:20px;text-transform:uppercase;letter-spacing:3px;opacity:0;transition:opacity 0.3s}
  .result.visible{opacity:1}
  .result.heads-result{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5)}
  .result.tails-result{color:#c0c0c0;text-shadow:0 0 20px rgba(192,192,192,0.5)}

  .btn{background:linear-gradient(145deg,#6366f1,#4f46e5);color:#fff;border:none;padding:14px 48px;font-size:18px;font-weight:600;border-radius:50px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 15px rgba(99,102,241,0.4);transition:all 0.2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,0.6)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

  .stats{position:absolute;bottom:20px;font-size:13px;color:rgba(255,255,255,0.5);display:flex;gap:24px}
  .stats span{display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.gold{background:#ffd700}
  .dot.silver{background:#c0c0c0}

  @media(max-width:480px){
    .coin{width:140px;height:140px}
    .coin .side{font-size:18px}
    .result{font-size:22px}
    .btn{padding:12px 36px;font-size:16px}
  }
</style>
</head>
<body>
  <div class="coin-container">
    <div class="coin" id="coin" onclick="flipCoin()">
      <div class="side heads">HEADS</div>
      <div class="side tails">TAILS</div>
    </div>
  </div>
  <div class="result" id="result"></div>
  <button class="btn" id="flipBtn" onclick="flipCoin()">Flip Coin</button>
  <div class="stats">
    <span><span class="dot gold"></span> Heads: <strong id="headsCount">0</strong></span>
    <span><span class="dot silver"></span> Tails: <strong id="tailsCount">0</strong></span>
  </div>

<script>
  let isFlipping = false;
  let headsCount = 0;
  let tailsCount = 0;

  function flipCoin() {
    if (isFlipping) return;
    isFlipping = true;

    const coin = document.getElementById('coin');
    const result = document.getElementById('result');
    const btn = document.getElementById('flipBtn');

    btn.disabled = true;
    result.classList.remove('visible', 'heads-result', 'tails-result');

    // Remove previous animation
    coin.classList.remove('flipping');
    coin.style.transform = '';

    // Random result: 0 = heads, 1 = tails
    const isHeads = Math.random() < 0.5;

    // Calculate rotation: multiple full spins + land on correct face
    // Heads = even half-turns (0, 360, 720...), Tails = odd half-turns (180, 540, 900...)
    const spins = 5 + Math.floor(Math.random() * 4); // 5-8 full rotations
    const endRotation = spins * 360 + (isHeads ? 0 : 180);

    coin.style.setProperty('--end-rotation', endRotation + 'deg');

    // Force reflow then start animation
    void coin.offsetHeight;
    coin.classList.add('flipping');

    setTimeout(() => {
      coin.classList.remove('flipping');
      coin.style.transform = `rotateY(${isHeads ? 0 : 180}deg)`;

      if (isHeads) {
        headsCount++;
        document.getElementById('headsCount').textContent = headsCount;
        result.textContent = 'Heads!';
        result.classList.add('visible', 'heads-result');
      } else {
        tailsCount++;
        document.getElementById('tailsCount').textContent = tailsCount;
        result.textContent = 'Tails!';
        result.classList.add('visible', 'tails-result');
      }

      btn.disabled = false;
      isFlipping = false;
    }, 1800);
  }
</script>
</body>
</html>
